# ============================================
# Application Configuration
# ============================================
spring.application.name=ITDP_backend
spring.application.version=1.0.0

# ============================================
# Server Configuration
# ============================================
server.port=1010
server.servlet.context-path=/api

# ============================================
# MySQL Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/traindb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Avirishi#72
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional (Hibernate usually detects this automatically)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.traindelay=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE